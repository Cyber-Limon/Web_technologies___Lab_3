<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная работа 3</title>
    <script src="script.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <h1 class="text-center">Задание 1</h1>

    <div class="mt-sm-2 container-md text-center">
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModel">
            Войти
        </button>
    </div>

    <div class="modal fade" id="exampleModel" tabindex="-1" aria-labelledby="exampleModelLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModelLabel">Заголовок модального окна</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>

                <form class="container-md">
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label">Адрес электронной почты</label>
                        <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                        <div id="emailHelp" class="form-text">Мы никогда никому не передадим вашу электронную почту.</div>
                    </div>

                    <div class="mb-3">
                        <label for="exampleInputPassword1" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="exampleInputPassword1" aria-describedby="emailHelp">
                    </div>

                    <div class="mb-3 form-check text-center">
                        <label class="form-check-label" id="exampleCheck1"></label>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                        <button type="button" onclick="auth();" class="btn btn-primary">Отправить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>



    <hr style="height: 50px; background-color: black;">



    <h1 class="text-center">Задание 2</h1>

    <div class="mt-sm-2 container-md text-center">
        <input type="text" id="faculty" class="form-control" placeholder="Название факультета / института" aria-describedby="basic-addon1" onkeyup="findFaculty(this);">
        <div id="result"></div>
    </div>



    <hr style="height: 50px; background-color: black;">



    <h1 class="text-center">Задание 3</h1>

    <div class="mt-sm-2 container-md text-center">
        <div class="cards d-flex">
            <div class="card" style="width: 18rem;">
                <div class="card-body">
                    <h5 class="card-title">Математика</h5>
                    <p>Цена: </p>
                    <p class="card-sum">4000</p>
                    <button type="button" class="btn btn-primary" onclick="sumItem(this);">В корзину</button>
                </div>
            </div>

            <div class="card" style="width: 18rem;">
                <div class="card-body">
                    <h5 class="card-title">Информатика</h5>
                    <p>Цена: </p>
                    <p class="card-sum">5000</p>
                    <button type="button" class="btn btn-primary" onclick="sumItem(this);">В корзину</button>
                </div>
            </div>

            <div class="card" style="width: 18rem;">
                <div class="card-body">
                    <h5 class="card-title">История</h5>
                    <p>Цена: </p>
                    <p class="card-sum">7000</p>
                    <button type="button" class="btn btn-primary" onclick="sumItem(this);">В корзину</button>
                </div>
            </div>

            <div class="card" style="width: 18rem;">
                <div class="card-body">
                    <h5 class="card-title">Обществознание</h5>
                    <p>Цена: </p>
                    <p class="card-sum">6000</p>
                    <button type="button" class="btn btn-primary" onclick="sumItem(this);">В корзину</button>
                </div>
            </div>

            <div class="card" style="width: 18rem;">
                <div class="card-body">
                    <h5 class="card-title">Русский язык</h5>
                    <p>Цена: </p>
                    <p class="card-sum">3000</p>
                    <button type="button" class="btn btn-primary" onclick="sumItem(this);">В корзину</button>
                </div>
            </div>
        </div>

        <p>Итоговая сумма: </p>
        <p id="sum">0</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
